name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings (good for portfolio projects)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Build Docker image
      run: docker build -t used-car-api .
    
    - name: Test Docker container starts and health check
      run: |
        docker run -d -p 8000:8000 --name test-container used-car-api
        # Wait for the API and the fallback retraining to finish
        sleep 15
        # Test the health endpoint
        curl -f http://localhost:8000/health || exit 1
        # Clean up
        docker stop test-container
        docker rm test-container